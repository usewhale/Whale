interface:
  display_name: "Ralph Orchestrator"
  short_description: "Run Ralph batches with a goal-driven main agent plus developer, validator, committer, and runtime-writer sub-agents"
  default_prompt: "Use $ralph-orchestrator to execute the current scripts/ralph/prd.json batch with a goal-driven main agent, structured child-agent handoffs, read-only state resolution in the main agent, and a fresh runtime-writer child agent for all mutable runtime writes."

purpose:
  summary: "Entry metadata for the Ralph batch orchestrator skill."
  not_for: "This file is not the full workflow definition. Follow SKILL.md and the reference prompts."

usage:
  primary: "Use this skill when the user wants to run or resume a Ralph feature batch."
  handoff: "The main agent owns story selection, phase routing, and write-plan generation; a fresh runtime-writer child agent performs all mutable runtime file writes via the local scripts under this skill."

references:
  skill: "../SKILL.md"
  workflows:
    - "../references/main-loop.md"
  prompts:
    - "../references/developer-agent.md"
    - "../references/validator-agent.md"
    - "../references/committer-agent.md"
    - "../references/runtime-writer-agent.md"
  scripts:
    - "../scripts/select_current_story.py"
    - "../scripts/resolve_story_phase.py"
    - "../scripts/check_story_state.py"
    - "../scripts/update_story_fields.py"
    - "../scripts/append_progress.py"

boundaries:
  - "Child agents return structured facts and do not directly write scripts/ralph/prd.json or scripts/ralph/progress.txt."
  - "The main agent selects the current story, resolves its lifecycle state, and stays write-clean: mutable runtime script execution belongs to a fresh runtime-writer child agent."
  - "passes=true means the story is fully completed only after development, validation, and commit have all succeeded; validator success alone must keep passes=false."
  - "Close each child agent immediately after its result has been consumed."

policy:
  allow_implicit_invocation: true
