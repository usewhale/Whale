name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Check formatting
        run: make fmt-check

      - name: Run go vet
        run: make vet

      - name: Run tests
        run: make test

  windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Compile Windows test binaries
        run: go test ./... -run '^$' -count=1

      - name: Run Windows shell resolver tests
        run: go test ./internal/shell -count=1

      - name: Run Windows shell integration tests
        run: |
          go test ./internal/tools -run TestWindowsShell -count=1
          go test ./internal/agent -run TestWindowsHook -count=1
